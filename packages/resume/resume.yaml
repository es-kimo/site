caseStudies:
  - title: '"내가 만든 기능이 사용자에게 실제로 도움이 될까?"'
    project: "ECG-GRAPH Labeling Tool"
    background:
      - "메디컬 팀에서 사용하는, 데이터 전처리용 심전도 그래프 라벨링 도구 개발을 맡게 됨"
      - "바닐라 자바스크립트로 구현되어있던 코드를 리액트로 마이그레이션하면서, 추가 기능을 구현하는 Job"
      - "메디컬 팀에서 기본적인 요구사항을 전달해주고, 구체적인 기획/구현/개선을 직접할 수 있는 기회"
      - "내가 만든 기능을 통해 사용자가 편리함을 느꼈으면 좋겠다는 바람을 가지고 착수"
    execution:
      - title: "실제 작업 루틴을 관찰하여 '불편함' 찾기"
        details:
          - "사용자의 반복되는 작업(드래그,호버,클릭) 사이에 불필요하게 많은 마우스 이동이 필요함"
      - title: "툴팁 UI 제작 (Figma)"
        details:
          - "마우스 동선을 최소화하는 구조로 UI를 개편하여 Figma에 컴포넌트 제작"
          - "Storybook 시각화를 통해 메디컬팀 피드백 과정을 편리하게 지원함"
      - title: "툴팁 렌더링 좌표 계산 로직 개발"
        details:
          - "툴팁이 브라우저 사이즈에 의해 잘리는 현상이 발생할 때, 불필요한 마우스 휠/드래그 동작이 발생함"
          - "사용자 입력 지점에 따라 툴팁 렌더링 위치를 계산하는 로직을 개발함으로써, 뷰포트 내부에서 모든 동작을 지원"
    impact:
      - "메디컬팀 피드백 기준 측정 소요 시간 ≈ 25% 단축"
      - "반복 작업 피로도가 크게 줄었음"

  - title: "멀티·싱글터치 충돌 해소 ― Zoom / Pan / 측정 / 정밀측정 / 드래깅 동시 제어"
    project: "ECG-GRAPH Ruler for Tablet"
    background:
      - "태블릿 환경에선 모든 제스처가 손가락으로 이뤄지기 때문에, ECG 파형을 확대·이동(Zoom/Pan) 하려다 측정점(Ruler)이 찍히거나 반대로 측정이 끊기는 문제가 반복됨"
      - "기존에는 심전도 그래프 10초 고정 스트립을 가정했는데, 요구사항을 30초까지 확대하면서 그래프를 양옆으로 움직이는 동작이 기존 Zoom·Pan 동작과 호환이 되어야 함"
      - "병원·검진센터 의료진에게는 줌 스케일 조절과 정밀 거리 측정이 모두 필수이므로, 여러 기능이 충돌 없이 공존해야 했음"
    execution:
      - title: "단일 인터랙션 FSM 설계"
        details:
          - "React Context 기반 5-State Finite State Model (ZOOM / RULER / PRECISE_RULER / DRAGGING / IDLE)로 컴포넌트의 모든 입력 흐름을 통합"
      - title: "30초 심전도 지원 - 복잡한 컴포넌트에 새로운 기능 추가 시 신중하게 접근"
        details:
          - "새로운 props를 추가하고 이를 기존 코드에 통합하면서, 정확한 순서로 옵셔널체이닝 연산자를 사용함으로써 기존 동작을 해치는 사이드 이펙트가 발생하지 않도록 조치"
          - "브라우저 IntersectionObserver로 좌·우 끝 탐지하는 레이어만 추가해, d3 Zoom 이벤트 중첩 제거"
      - title: "Draggable 요소의 이벤트 생명주기를 Hook으로 모듈화"
        details:
          - "드래그와 관련된 이벤트를 전역에 등록하고, 언마운트시 이벤트를 제거하는 라이프사이클을 관리"
          - "새로운 Draggable 기능 추가 시 코드 재사용률 80% 이상"
      - title: "테스트"
        details:
          - "Storybook 배포를 통해, iPad / Android Tablet 제스처 시나리오 20건 검증"
    impact:
      - "한 손 Pan·두 손 Zoom·측정·정밀측정이 서로 간섭 0건(Storybook 시나리오 20+회 테스트)"
      - "DRY한 훅·컴포넌트 구조로 후속 유지보수 범위 대폭 감소"

