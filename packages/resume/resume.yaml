caseStudies:
  - title: "한 손가락 터치로 4가지 동작 구분하기 ― 탭·롱프레스·드래그·핀치를 충돌 없이"
    project: "ECG-GRAPH Ruler for Tablet"
    background:
      - "데스크톱에서는 클릭·Ctrl+드래그·휠 등으로 동작을 쉽게 구분하지만, 태블릿에서는 모든 입력이 손가락 터치 하나로 시작됨. 터치 시작 시점에는 사용자의 의도(측정점 찍기? 그래프 이동? 정밀측정?)를 알 수 없음"
      - "동시에, 이 SVG 위에서 d3-zoom이 자체 이벤트 시스템으로 핀치 줌·팬을 처리하고 있어, 커스텀 터치 로직과 같은 DOM 이벤트를 경쟁적으로 소비하는 충돌이 발생"
      - "병원·검진센터 의료진은 줌/팬과 정밀측정을 모두 사용하므로, 어느 하나를 포기할 수 없었음"
    execution:
      - title: "제스처 판별: 시간 × 이동량 기반 사후 분류"
        details:
          - "터치 시작 시 타이머(800ms)와 시작 좌표를 기록하고, 이후 이벤트의 시간·이동량으로 의도를 판별하는 구조 설계"
          - "10px 이상 이동 → 드래그(Zoom/Pan으로 전이), 800ms 이상 홀드 → 정밀측정 모드 진입, 두 번째 손가락 감지(!isPrimary) → 즉시 줌 전이, 그 외 → 탭(측정점 생성)"
          - "iPad / Android 태블릿에서 직접 테스트하며 임계값을 튜닝 ― 10px 미만이면 손 떨림에 의한 오발동, 15px 이상이면 의도적 탭을 드래그로 오인하는 문제를 반복 실험으로 확인"
      - title: "d3-zoom 이벤트 충돌 해소"
        details:
          - "d3-zoom의 filter 콜백에 현재 상태(ButtonDragging, PreciseMeasurement 등)를 주입하여, 커스텀 인터랙션 중에는 d3가 이벤트를 소비하지 않도록 차단"
          - "정밀측정 중 d3의 zoom 이벤트가 발동되면 SVG 전체가 밀리는 문제를 발견 → zoom 핸들러 내에서 PreciseMeasurement 상태일 때 transform 적용을 건너뛰고, zoom end 시점에 마지막 transform으로 롤백하여 d3의 내부 상태를 정밀측정 이전으로 복원"
      - title: "파형 근방 hit testing으로 오입력 방지"
        details:
          - "SVG 좌표계에서 터치 y좌표와 실제 ECG 파형 데이터의 y좌표 간 거리를 계산하여, gridUnit × 3 범위 안에서만 측정점 생성을 허용"
          - "정밀측정 모드에서는 이 제한을 해제하여 파형에서 먼 영역도 측정 가능 ― 모드에 따라 검증 기준을 분기"
      - title: "드래그 라이프사이클 훅 모듈화"
        details:
          - "document에 capture 단계로 pointermove/pointerup을 등록하여, SVG 내부의 다른 핸들러보다 먼저 드래그 이벤트를 처리"
          - "모바일 전용 래퍼 훅이 드래그 시작 시 상태를 ButtonDragging으로 전환 → 드래그 종료 시 이전 상태로 복원하는 패턴으로, 드래그 중 다른 터치 동작이 개입하는 것을 차단"
          - "캘리퍼(이동 가능한 측정선), 버튼 그룹 등 모든 Draggable 요소가 이 훅을 공유하여 재사용"
    impact:
      - "탭·롱프레스·드래그·핀치 간 간섭 0건 (iPad / Android Tablet 시나리오 20건 이상 검증)"
      - "임계값 튜닝 후 의료진의 오입력 리포트 0건"

