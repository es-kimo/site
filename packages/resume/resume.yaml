deepDives:
  - id: "tablet-gesture-disambiguation"
    title: "한 손가락 터치로 여러 동작을 구분하기 ― 탭·롱프레스·드래그·핀치를 충돌 없이"
    project: "ECG-GRAPH Ruler for Tablet"
    problemStatement: "태블릿에서는 모든 입력이 손가락 터치 하나에서 시작되고, 동시에 d3-zoom이 핀치 줌·팬을 처리하고 있어 커스텀 인터랙션과 이벤트 충돌이 발생했습니다."
    background:
      - "데스크톱에서는 클릭, Ctrl+드래그, 휠 등으로 동작을 쉽게 구분할 수 있지만 태블릿에서는 모든 입력이 터치 하나로 시작됩니다."
      - "터치 시작 시점에는 사용자의 의도(점 생성 / 그래프 이동 / 정밀 측정)를 알 수 없었습니다."
      - "줌/팬과 정밀 측정을 모두 포기할 수 없는 의료진 사용 환경이었습니다."
    execution:
      - title: "제스처 판별: 시간 × 이동량 기반 사후 분류"
        details:
          - "터치 시작 시 타이머(800ms)와 시작 좌표를 기록하고, 이후 이벤트의 시간·이동량으로 의도를 판별하는 구조를 설계했습니다."
          - "10px 이상 이동 시 드래그(Zoom/Pan), 800ms 이상 홀드 시 정밀 측정, 두 번째 손가락 감지 시 즉시 줌, 그 외는 탭으로 분기했습니다."
          - "iPad / Android 태블릿에서 직접 테스트하며 임계값을 튜닝했습니다."
      - title: "d3-zoom 이벤트 충돌 해소"
        details:
          - "d3-zoom filter에 현재 상태를 주입해 커스텀 인터랙션 중에는 d3가 이벤트를 소비하지 않도록 제어했습니다."
          - "정밀 측정 중 zoom 이벤트로 SVG 전체가 밀리는 문제를 발견하고, transform 적용을 제어하고 마지막 상태로 복원하는 방식으로 충돌을 줄였습니다."
      - title: "파형 근방 hit testing으로 오입력 방지"
        details:
          - "터치 y좌표와 ECG 파형 데이터 y좌표 간 거리를 계산해 유효한 터치 범위를 제한했습니다."
          - "정밀 측정 모드에서는 이 제한을 해제해 측정 목적에 맞는 입력 허용 범위를 분기했습니다."
      - title: "드래그 라이프사이클 훅 모듈화"
        details:
          - "document capture 단계에서 pointermove/pointerup을 처리하도록 설계했습니다."
          - "모바일 전용 래퍼 훅으로 드래그 시작/종료 시 상태를 일관되게 전환하도록 만들었습니다."
          - "캘리퍼, 버튼 그룹 등 여러 Draggable 요소가 동일한 훅을 공유하도록 구성했습니다."
    impact:
      - "탭·롱프레스·드래그·핀치 간 간섭 0건 (iPad / Android Tablet 시나리오 20건 이상 검증)"
      - "임계값 튜닝 후 의료진의 오입력 리포트 0건"
    skillsShown:
      - "Interaction Design"
      - "State Modeling"
      - "D3 Event Control"
      - "UX Validation"

